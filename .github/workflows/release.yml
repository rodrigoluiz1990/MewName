name: Release APK

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Locate Android SDK tools
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            for candidate in /usr/local/lib/android/sdk "$HOME/Android/Sdk" "$HOME/Library/Android/sdk"; do
              if [ -d "$candidate" ]; then
                SDK_ROOT="$candidate"
                break
              fi
            done
          fi
          if [ -z "$SDK_ROOT" ]; then
            echo "Android SDK nao encontrado no runner." >&2
            exit 1
          fi
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          for dir in \
            "$SDK_ROOT/cmdline-tools/latest/bin" \
            "$SDK_ROOT/cmdline-tools/bin" \
            "$SDK_ROOT/tools/bin" \
            "$SDK_ROOT/platform-tools"; do
            if [ -d "$dir" ]; then
              echo "$dir" >> "$GITHUB_PATH"
            fi
          done
          echo "SDK localizado em: $SDK_ROOT"

      - name: Verify Android SDK and install packages
        shell: bash
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME:-<vazio>}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<vazio>}"
          command -v sdkmanager || {
            echo "sdkmanager nao encontrado. Conteudo do SDK:" >&2
            find "$ANDROID_SDK_ROOT" -maxdepth 3 -type f | head -n 200 >&2
            exit 127
          }
          sdkmanager --version
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mewname-release.jks"
            echo "MEWNAME_UPLOAD_STORE_FILE=$RUNNER_TEMP/mewname-release.jks" >> "$GITHUB_ENV"
            echo "MEWNAME_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "MEWNAME_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "MEWNAME_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "Nenhum keystore configurado; a build release seguira sem assinatura de producao."
          fi

      - name: Build release APK
        shell: bash
        run: ./gradlew --no-daemon assembleRelease --stacktrace

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          mkdir -p dist
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "Nenhuma APK release foi encontrada." >&2
            exit 1
          fi
          tag_name="${GITHUB_REF_NAME}"
          asset_name="MewName-${tag_name}.apk"
          cp "$apk_path" "dist/$asset_name"
          echo "apk_path=dist/$asset_name" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.asset.outputs.apk_path }}
