name: Release APK

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mewname-release.jks"
            echo "MEWNAME_UPLOAD_STORE_FILE=$RUNNER_TEMP/mewname-release.jks" >> "$GITHUB_ENV"
            echo "MEWNAME_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "MEWNAME_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "MEWNAME_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "Nenhum keystore configurado; a build release seguira sem assinatura de producao."
          fi

      - name: Build release APK
        shell: bash
        run: ./gradlew --no-daemon assembleRelease --stacktrace

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          mkdir -p dist
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "Nenhuma APK release foi encontrada." >&2
            exit 1
          fi
          tag_name="${GITHUB_REF_NAME}"
          asset_name="MewName-${tag_name}.apk"
          cp "$apk_path" "dist/$asset_name"
          echo "apk_path=dist/$asset_name" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.asset.outputs.apk_path }}
