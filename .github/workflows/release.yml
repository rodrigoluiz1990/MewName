name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/mewname-release.jks"
          echo "MEWNAME_UPLOAD_STORE_FILE=$RUNNER_TEMP/mewname-release.jks" >> "$GITHUB_ENV"
          echo "MEWNAME_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "MEWNAME_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "MEWNAME_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release APK
        shell: bash
        run: ./gradlew assembleRelease

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          mkdir -p dist
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "Nenhuma APK release foi encontrada." >&2
            exit 1
          fi
          tag_name="${GITHUB_REF_NAME:-manual}"
          asset_name="MewName-${tag_name}.apk"
          cp "$apk_path" "dist/$asset_name"
          echo "apk_path=dist/$asset_name" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.asset.outputs.apk_path }}
